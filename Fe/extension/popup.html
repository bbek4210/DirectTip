<!DOCTYPE html>
<html>
<head>
    <title>DirectTip Settings</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            background: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        h2 {
            font-size: 18px;
            margin-top: 0;
            background: linear-gradient(135deg, #9945FF, #14F195);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #b0b0b0;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 12px;
        }
        input:focus {
            border-color: #9945FF;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9945FF, #14F195);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .status {
            font-size: 11px;
            text-align: center;
            margin-top: 10px;
            color: #14F195;
            display: none;
        }
    </style>
</head>
<body>
    <h2>DirectTip</h2>
    <div class="form-group">
        <label>Creator Solana Wallet</label>
        <input type="text" id="creator-wallet" placeholder="Enter wallet address...">
    </div>
    <div class="form-group">
        <label>Stream URL (Optional)</label>
        <input type="text" id="stream-url" placeholder="YouTube Live URL...">
    </div>
    <button id="save-btn">Save Configuration</button>
    <div id="status" class="status">Settings saved!</div>
    
    <script src="popup.js"></script>
</body>
</html>
